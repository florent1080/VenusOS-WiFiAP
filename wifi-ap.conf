# WiFi Access Point configuration for VenusOS-WiFiAP
#
# Edit these values to match your setup.
# This file is preserved on reinstall.

# WiFi network name (SSID)
SSID=ZeVan

# WiFi password (WPA2-PSK, 8-63 characters)
PASSWORD=victron1234

# WiFi channel (1-11 for 2.4 GHz, channel 1 recommended for BCM43438)
CHANNEL=1

# IP address of the RPi (gateway for clients)
AP_IP=192.168.0.1

# DHCP range for clients
DHCP_START=192.168.0.100
DHCP_END=192.168.0.200
DHCP_LEASE=2m

# Upstream interface for NAT (internet sharing)
UPSTREAM=wwan0
